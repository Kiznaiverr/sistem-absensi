services:
  absensi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absensi-app

    # VPS with NAT: expose internal port (akses via Cloudflare Tunnel)
    expose:
      - "5000"

    env_file:
      - .env
    restart: unless-stopped

    # Optional: health check
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:5000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: absensi-cloudflared
    restart: unless-stopped
    depends_on:
      - absensi-app
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    environment:
      TUNNEL_LOGLEVEL: info
