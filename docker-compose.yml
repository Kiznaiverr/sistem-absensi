services:
  absensi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absensi-app

    # VPS with NAT: expose internal port (akses via Cloudflare Tunnel)
    expose:
      - "5000"

    env_file:
      - .env
    restart: unless-stopped

    # Optional: health check
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:5000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Cloudflare Tunnel for VPS NAT environments
  # Setup:
  #   1. Create tunnel at https://dash.cloudflare.com/ → Zero Trust → Tunnels (get Token & Tunnel ID)
  #   2. Add CLOUDFLARE_TOKEN and CLOUDFLARE_TUNNEL_ID to .env
  #   3. Replace 'ports:' with 'expose:' in absensi-app above
  #   4. Run: docker-compose --profile vpn up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: absensi-cloudflared
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    restart: unless-stopped
    profiles:
      - vpn
    depends_on:
      - absensi-app
